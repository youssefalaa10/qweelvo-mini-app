apiVersion: apps/v1
kind: Deployment
metadata:
  name: qweelvo-mini-app
  namespace: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qweelvo-mini-app
  template:
    metadata:
      labels:
        app: qweelvo-mini-app
    spec:
      serviceAccountName: qweelvo-mini-app-sa
      containers:
        - name: qweelvo-mini-app
          image: ghcr.io/qweelvohq/qweelvo-mini-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
          livenessProbe:
            httpGet:
              path: /
              port: 8000
